[package]
name = "solver"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.33.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Use pure-Rust TLS to avoid native toolchain issues on Windows
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }