[package]
name = "solver-service"
version = "0.1.0"
edition = "2021"

[dependencies]
# The service runtime and web framework
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
axum = { version = "0.7", features = ["macros", "json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }

# Local solver core library
solver-core = { path = "../solver-core" }

# Solana SDK for wallet management
solana-sdk = "1.18.14"
dotenvy = "0.15"
bip39 = "2.0"

# New dependencies for deserialization
base64 = "0.22.1"
bincode = "1.3.3"


[dev-dependencies]
tower = "0.5"