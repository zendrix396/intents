[package]
name = "solver-core"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", default-features = false, features = ["json", "rustls-tls"] }

# New dependencies for RPC and error handling
solana-client = "1.18.14"
thiserror = "1.0"
futures = "0.3"

# New dependencies for transaction handling
solana-sdk = "1.18.14"
solana-transaction-status = "1.18.14"